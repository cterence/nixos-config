# This example uses YAML anchors which allows reuse of multiple keys
# without having to repeat yourself.
# Also see https://github.com/Mic92/dotfiles/blob/d6114726d859df36ccaa32891c4963ae5717ef7f/nixos/.sops.yaml
# for a more complex example.
keys:
  - &framework13 age1dz90388umnh8nmk2akt89le408t7488ruax60zdww2lhgvasrp0q5tlal8
  - &github_actions age16h63pg8r7xfzu4shptpchztgnw5q3t3s08x5fvclmq9hya94zvwqfkwxv6
creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *framework13
          - *github_actions
  - path_regex: cert.p12
    key_groups:
      - age:
          - *framework13
          - *github_actions
