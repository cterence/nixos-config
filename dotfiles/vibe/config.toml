active_model = "zai-glm-5-2"
theme = "ansi-dark"
disable_welcome_banner_animation = false
autocopy_to_clipboard = true
file_watcher_for_autocomplete = false
ask_confirmation_on_exit = true
displayed_workdir = ""
context_warnings = false
voice_mode_enabled = false
narrator_enabled = false
active_transcribe_model = "voxtral-realtime"
active_tts_model = "voxtral-tts"
bypass_tool_permissions = false
raise_on_compaction_failure = false
enable_telemetry = true
system_prompt_id = "cli"
compaction_prompt_id = "compact"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = true
enable_notifications = true
enable_system_trust_store = false
api_timeout = 720.0
api_retry_max_elapsed_time = 300.0
auto_compact_threshold = 200000
tool_paths = []
applied_migrations = ["bash_read_only_defaults_v1"]

[[mcp_servers]]
name = "grafana"
transport = "http"
url = "https://gmcp.terence.cloud/sse"
enable_connectors = true
connectors = []
enabled_tools = []
disabled_tools = []
agent_paths = []
enabled_agents = []
disabled_agents = []
installed_agents = []
default_agent = "default"
skill_paths = ["~/.config/opencode/skills"]
experimental_enable_registry_skills = false
enabled_skills = []
disabled_skills = []
applied_migrations = ["bash_read_only_defaults_v1"]

[mcp_servers.auth]
type = "static"
api_key_env = "GRAFANA_MCP_AUTH"
api_key_header = "Authorization"
api_key_format = "Basic {token}"

[experiment_overrides]

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
browser_auth_base_url = "https://console.mistral.ai"
browser_auth_api_base_url = "https://console.mistral.ai/api"
api_style = "openai"
backend = "mistral"
reasoning_field_name = "reasoning_content"
project_id = ""
region = ""

[providers.extra_headers]

[[providers]]
name = "llamacpp"
api_base = "http://127.0.0.1:8080/v1"
api_key_env_var = ""
api_style = "openai"
backend = "generic"
reasoning_field_name = "reasoning_content"
project_id = ""
region = ""

[providers.extra_headers]

[[models]]
name = "mistral-vibe-cli-latest"
provider = "mistral"
alias = "mistral-medium-3.5"
temperature = 1.0
input_price = 1.5
output_price = 7.5
thinking = "high"
supports_images = true
auto_compact_threshold = 200000

[[models]]
name = "zai-glm-5-2"
provider = "mistral"
thinking = "max"
temperature = 1.0
alias = "zai-glm-5-2"
auto_compact_threshold = 500000

[[transcribe_providers]]
name = "mistral"
api_base = "wss://api.mistral.ai"
api_key_env_var = "MISTRAL_API_KEY"
client = "mistral"

[[transcribe_models]]
name = "voxtral-mini-transcribe-realtime-2602"
provider = "mistral"
alias = "voxtral-realtime"
sample_rate = 16000
encoding = "pcm_s16le"
language = "en"
target_streaming_delay_ms = 500

[[tts_providers]]
name = "mistral"
api_base = "https://api.mistral.ai"
api_key_env_var = "MISTRAL_API_KEY"
client = "mistral"

[[tts_models]]
name = "voxtral-mini-tts-latest"
provider = "mistral"
alias = "voxtral-tts"
voice = "gb_jane_neutral"
response_format = "wav"

[project_context]
default_commit_count = 5
timeout_seconds = 2.0

[experiments]
enable = true
api_host = "https://experiments.mistral.services/"
client_key = "sdk-OE8yJgTXZY6tj"

[session_logging]
save_dir = "~/.vibe/logs/session"
session_prefix = "session"
enabled = true

[tools.skill]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []

[tools.exit_plan_mode]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []

[tools.task]
permission = "ask"
allowlist = ["explore"]
denylist = []
sensitive_patterns = []

[tools.grep]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = ["**/.env", "**/.env.*"]
max_output_bytes = 64000
default_max_matches = 100
default_timeout = 60
exclude_patterns = [
    ".venv/",
    "venv/",
    ".env/",
    "env/",
    "node_modules/",
    ".git/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".tox/",
    ".nox/",
    ".coverage/",
    "htmlcov/",
    "dist/",
    "build/",
    ".idea/",
    ".vscode/",
    "*.egg-info",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    ".DS_Store",
    "Thumbs.db",
]
codeignore_file = ".vibeignore"

